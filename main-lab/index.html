/* ─────────── derived values: dates + "today" (computed, don't edit) ─────────── */
(function deriveLab() {
  const L = window.LAB;
  const MON_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [wy, wm, wd] = L.weekStartDate.split("-").map(Number);

  const weekDates = [];                         // five Date objects, Mon→Fri
  for (let i = 0; i < 5; i++) weekDates.push(new Date(wy, wm - 1, wd + i));

  const fmt = d => MON_NAMES[d.getMonth()] + " " + d.getDate();
  const mon = weekDates[0], fri = weekDates[4];
  const weekOf = mon.getMonth() === fri.getMonth()
    ? MON_NAMES[mon.getMonth()] + " " + mon.getDate() + " – " + fri.getDate() + ", " + fri.getFullYear()
    : fmt(mon) + " – " + fmt(fri) + ", " + fri.getFullYear();

  // Which day to open on. Mon–Fri → that weekday. Sat/Sun → upcoming Monday (idx 0).
  const now = new Date();
  const dow = now.getDay();                     // 0=Sun … 6=Sat
  const isWeekend = (dow === 0 || dow === 6);
  const openIdx = isWeekend ? 0 : dow - 1;

  // Only flag a day "TODAY" if the real calendar date matches the loaded week.
  const sameYMD = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  const liveIdx = (!isWeekend && sameYMD(now, weekDates[openIdx])) ? openIdx : -1;

  L.derived = {
    days:     ["Mon", "Tue", "Wed", "Thu", "Fri"],
    fullDays: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
    dates:    weekDates.map(fmt),
    weekOf,
    openIdx,        // day the page opens on
    liveIdx,        // index of the real "today", or -1 if not within this week
    isWeekend
  };
})();

/* ─────────── small helper used by the UI ─────────── */
window.PD = {
  // Group a shift's scenarios by instructor; shared (unassigned) ones collected separately.
  scenariosByInstructor(shift) {
    if (!shift || !shift.scenarios || shift.scenarios.length === 0) return null;
    const perInstructor = new Map();
    shift.instructors.forEach(i => perInstructor.set(i.name, []));
    const shared = [];
    shift.scenarios.forEach(scn => {
      if (!scn.assignedTo) { shared.push(scn); return; }
      const targets = Array.isArray(scn.assignedTo) ? scn.assignedTo : [scn.assignedTo];
      targets.forEach(t => {
        if (!perInstructor.has(t)) perInstructor.set(t, []);
        perInstructor.get(t).push(scn);
      });
    });
    return { perInstructor, shared };
  }
};
</script>

<script type="text/babel">
const { useState } = React;

function InstructorHub() {
  const L = window.LAB;
  const D = L.derived;
  const [dayIdx, setDayIdx] = useState(D.openIdx);

  const dayCohorts = L.cohorts.map((c, ci) => ({
    cohort: c, cIdx: ci + 1, day: L.schedule[c.id][dayIdx]
  }));
  const isLive = dayIdx === D.liveIdx;
  let activeCount = 0;
  dayCohorts.forEach(({ day }) => { if (day && day.am) activeCount++; if (day && day.pm) activeCount++; });

  return (
    <div style={{ fontFamily: "var(--font-sans)", background: "var(--bg)", color: "var(--ink)", minHeight: "100%", padding: "28px 36px 40px" }}>

      {/* top bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 30, height: 30, borderRadius: 7, background: "var(--accent)", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700, fontSize: 16 }}>+</div>
          <div>
            <div style={{ fontSize: 11, fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.14em", color: "var(--ink-soft)" }}>MATC Paramedic Lab</div>
            <div style={{ fontSize: 14, fontWeight: 500 }}>Instructor Hub · <span style={{ color: "var(--ink-soft)" }}>Week of {D.weekOf}</span></div>
          </div>
        </div>

        {/* day picker */}
        <div style={{ display: "flex", gap: 4, padding: 4, background: "var(--bg-sunk)", borderRadius: 10 }}>
          {D.days.map((d, di) => {
            const isActive = di === dayIdx;
            const isToday = di === D.liveIdx;
            return (
              <button key={di} onClick={() => setDayIdx(di)} style={{
                background: isActive ? "var(--bg-card)" : "transparent",
                color: isActive ? "var(--ink)" : "var(--ink-mid)",
                border: "none", borderRadius: 7, padding: "8px 14px", cursor: "pointer",
                display: "flex", alignItems: "baseline", gap: 6,
                boxShadow: isActive ? "0 1px 2px rgba(0,0,0,0.06)" : "none"
              }}>
                <span style={{ fontSize: 11, fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.08em", color: isToday ? "var(--accent-deep)" : "inherit" }}>{d}</span>
                <span style={{ fontSize: 14, fontWeight: 500 }}>{D.dates[di].split(" ")[1]}</span>
                {isToday && <span style={{ width: 5, height: 5, borderRadius: 999, background: "var(--accent)", marginLeft: 2 }} />}
              </button>
            );
          })}
        </div>
      </div>

      {/* date hero */}
      <div style={{ display: "flex", alignItems: "baseline", gap: 16, padding: "12px 0 18px", borderBottom: "1px solid var(--line)", marginBottom: 22, flexWrap: "wrap" }}>
        <div className="font-serif" style={{ fontSize: 52, lineHeight: 0.95 }}>{D.fullDays[dayIdx]}</div>
        <div style={{ fontSize: 18, color: "var(--ink-soft)" }}>{D.dates[dayIdx]}</div>
        {isLive && (
          <div style={{ fontSize: 10, fontFamily: "var(--font-mono)", background: "var(--accent)", color: "white", padding: "4px 9px", borderRadius: 3, letterSpacing: "0.14em", alignSelf: "center" }}>● TODAY</div>
        )}
        {D.isWeekend && dayIdx === D.openIdx && (
          <div style={{ fontSize: 10, fontFamily: "var(--font-mono)", background: "var(--bg-sunk)", color: "var(--ink-mid)", padding: "4px 9px", borderRadius: 3, letterSpacing: "0.14em", alignSelf: "center" }}>WEEK AHEAD</div>
        )}
        <div style={{ flex: 1 }} />
        <div style={{ fontSize: 12, color: "var(--ink-soft)", fontFamily: "var(--font-mono)" }}>{activeCount} active sessions · {L.cohorts.length} cohorts</div>
      </div>

      {/* AM / PM columns */}
      <div className="ampm-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {["am", "pm"].map(shiftKey => (
          <div key={shiftKey}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 12 }}>
              <div className="font-serif" style={{ fontSize: 28, lineHeight: 1 }}>{shiftKey === "am" ? "Morning" : "Afternoon"}</div>
              <div style={{ fontSize: 12, fontFamily: "var(--font-mono)", color: "var(--ink-soft)", letterSpacing: "0.06em" }}>{L.shifts[shiftKey]}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {dayCohorts.map(({ cohort, cIdx, day }) => (
                <ShiftCard key={cohort.id} cohort={cohort} cIdx={cIdx} shift={day && day[shiftKey]} />
              ))}
            </div>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 30, paddingTop: 14, borderTop: "1px solid var(--line)", fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--ink-soft)" }}>
        Schedule lives in the <code>LAB</code> block at the top of this file · update <code>weekStartDate</code> + <code>schedule</code> each week and re-push.
      </div>
    </div>
  );
}

        display: "flex", alignItems: "center", justifyContent: "space-between", opacity: 0.55
      }}>
        <div style={{ fontSize: 12, fontFamily: "var(--font-mono)", color: "var(--ink-mid)", textTransform: "uppercase", letterSpacing: "0.08em" }}>{cohort.name}</div>
        <span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--ink-soft)" }}>— no session —</span>
      </div>
    );
  }

  const meta = L.typeMeta[shift.type] || { label: shift.type };
  const grouped = window.PD.scenariosByInstructor(shift);
  const hasMultiInstructors = shift.instructors.length > 1;

  return (
    <div className={`rail-c${cIdx}`} style={{ background: "var(--bg-card)", border: "1px solid var(--line)", borderRadius: 10, padding: "14px 16px 16px 22px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, gap: 8, flexWrap: "wrap" }}>
        <div style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--ink-mid)", textTransform: "uppercase", letterSpacing: "0.08em" }}>{cohort.name} · {cohort.stage}</div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <span className={`pill ${shift.type}`}>{meta.label}</span>
          <span style={{ fontSize: 10, fontFamily: "var(--font-mono)", color: "var(--ink-soft)" }}>{shift.room}</span>
        </div>
      </div>

      <div className="font-serif" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 10 }}>{shift.title}</div>

      {grouped ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {grouped.shared.length > 0 && <ScenarioGroup label="Everyone" scenarios={grouped.shared} />}
          {[...grouped.perInstructor.entries()].map(([name, scns]) => {
            const ins = shift.instructors.find(i => i.name === name);
            return <InstructorBlock key={name} name={name} role={ins ? ins.role : null} scenarios={scns} solo={!hasMultiInstructors} />;
          })}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {shift.instructors.map((ins, i) => (
            <div key={i} style={{ display: "flex", gap: 10, fontSize: 13 }}>
              <span style={{ fontWeight: 500, minWidth: 96 }}>{ins.name}</span>
              <span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--ink-soft)" }}>{ins.role}</span>
            </div>
          ))}
          {shift.link && <a href={shift.link.href} target="_blank" rel="noopener noreferrer" className="scenario-link" style={{ marginTop: 6, fontSize: 13 }}>{shift.link.label}</a>}
        </div>
      )}
    </div>
  );
}

function InstructorBlock({ name, role, scenarios, solo }) {
  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
        <span style={{ fontWeight: 600, fontSize: 13 }}>{name}</span>
        {role && <span style={{ fontSize: 10, fontFamily: "var(--font-mono)", color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.08em" }}>{role}</span>}
      </div>
      {scenarios.length === 0 ? (
        <div style={{ fontSize: 12, color: "var(--ink-soft)", fontStyle: "italic", paddingLeft: 2 }}>assists on shared scenarios</div>
      ) : (
        <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 3 }}>
          {scenarios.map((s, i) => (
            <li key={i} style={{ fontSize: 13, display: "flex", gap: 8, alignItems: "baseline" }}>
              <span style={{ color: "var(--ink-soft)", fontFamily: "var(--font-mono)", fontSize: 10, paddingTop: 2 }}>›</span>
              <a href={s.href} target="_blank" rel="noopener noreferrer" className="scenario-link" style={{ fontSize: 13 }}>{s.title}</a>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function ScenarioGroup({ label, scenarios }) {
  return (
    <div style={{ background: "var(--bg-sunk)", borderRadius: 7, padding: "8px 10px" }}>
      <div style={{ fontSize: 10, fontFamily: "var(--font-mono)", color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>{label}</div>
      <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 3 }}>
        {scenarios.map((s, i) => (
          <li key={i} style={{ fontSize: 13, display: "flex", gap: 8, alignItems: "baseline" }}>
            <span style={{ color: "var(--ink-soft)", fontFamily: "var(--font-mono)", fontSize: 10, paddingTop: 2 }}>›</span>
            <a href={s.href} target="_blank" rel="noopener noreferrer" className="scenario-link" style={{ fontSize: 13 }}>{s.title}</a>
          </li>
        ))}
      </ul>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<InstructorHub />);
</script>
</body>
</html>
